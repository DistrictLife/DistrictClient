name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de release (ex: v1.0.11)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Release dlclient
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Rendre gradlew exécutable
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew

      - name: Build (release)
        run: ./gradlew build --no-daemon

      - name: Récupérer le nom du JAR
        id: jar
        run: |
          JAR=$(ls build/libs/dlclient-*.jar | grep -v 'sources\|javadoc' | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: dlclient ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: false
          files: ${{ steps.jar.outputs.path }}
          body: |
            ## dlclient ${{ github.ref_name || inputs.tag }}

            Mod Forge 1.16.5 — GUI de création de personnage RP + override du rendu de skin.

            **Installation :** déposer le JAR dans le dossier `mods/` du client Forge 1.16.5.

            > Ce mod est **obligatoire** dans le modpack District Life.
            > Le serveur kick tout joueur qui ne l'a pas installé.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
