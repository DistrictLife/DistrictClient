name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de release (ex: v1.0.11)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Release dlclient
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Télécharge Gradle 7.6.1 et l'expose comme commande `gradle` dans le PATH.
      # On bypass complètement le script gradlew (qui a des problèmes de CRLF/permissions).
      - name: Setup Gradle 7.6.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.1'

      - name: Debug env
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Gradle ==="
          gradle --version
          echo "=== Working dir ==="
          ls -la

      - name: Build (release)
        run: gradle build --no-daemon --stacktrace
        timeout-minutes: 15

      - name: Récupérer le nom du JAR
        id: jar
        run: |
          JAR=$(ls build/libs/dlclient-*.jar | grep -v 'sources\|javadoc' | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: dlclient ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: false
          files: ${{ steps.jar.outputs.path }}
          body: |
            ## dlclient ${{ github.ref_name || inputs.tag }}

            Mod Forge 1.16.5 — GUI de création de personnage RP + override du rendu de skin.

            **Installation :** déposer le JAR dans le dossier `mods/` du client Forge 1.16.5.

            > Ce mod est **obligatoire** dans le modpack District Life.
            > Le serveur kick tout joueur qui ne l'a pas installé.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
